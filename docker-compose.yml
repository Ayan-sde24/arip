services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: arip-backend
    env_file:
      - .env
    environment:
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_NAME: arip
      DATABASE_USER: arip
      DATABASE_PASSWORD: arip_password
      DATABASE_URL: postgresql+psycopg://arip:arip_password@postgres:5432/arip
    ports:
      - "8000:8000"
    volumes:
      - ./storage:/app/storage
      - ./logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: arip-postgres
    environment:
      POSTGRES_DB: arip
      POSTGRES_USER: arip
      POSTGRES_PASSWORD: arip_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U arip -d arip"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
